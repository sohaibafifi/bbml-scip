# Supported benchmark methods for the runnable repository surface.

defaults:
  time_limit: 3600
  seeds: [0, 1, 2, 3, 4]

baselines:
  scip-default:
    description: "SCIP branching without BBML scoring"
    ml: false

  strong-branch:
    description: "SCIP full strong branching (only when available in the current SCIP build)"
    ml: false

  bbml-mlp:
    description: "Tabular MLP ranker exported to ONNX"
    ml: true
    model: results/models/bbml_mlp.onnx
    temperature: results/models/bbml_mlp.temperature.txt

  bbml-gnn-varonly:
    description: "Variable-only GNN ranker exported to ONNX"
    ml: true
    model: results/models/bbml_gnn_varonly.onnx
    temperature: results/models/bbml_gnn_varonly.temperature.txt

  bbml-gnn-graph:
    description: "Graph-input GNN ensemble exported to ONNX and blended with runtime confidence"
    ml: true
    model: results/models/bbml_gnn_graph.onnx
    temperature: results/models/bbml_gnn_graph.temperature.txt

  bbml-gnn-graph-fp32:
    description: "Graph-input GNN ranker exported as FP32 ONNX"
    ml: true
    model: results/models/bbml_gnn_graph_fp32.onnx
    temperature: results/models/bbml_gnn_graph.temperature.txt

  bbml-gnn-graph-fp16:
    description: "Graph-input GNN ranker exported as FP16 ONNX"
    ml: true
    model: results/models/bbml_gnn_graph_fp16.onnx
    temperature: results/models/bbml_gnn_graph.temperature.txt

  pure-imitation:
    description: "Graph-input GNN with alpha fixed to 1.0"
    ml: true
    model: results/models/bbml_gnn_graph.onnx
    temperature: results/models/bbml_gnn_graph.temperature.txt

  alpha-fixed-0.5:
    description: "Graph-input GNN with alpha fixed to 0.5"
    ml: true
    model: results/models/bbml_gnn_graph.onnx
    temperature: results/models/bbml_gnn_graph.temperature.txt

  solver-only-alpha0:
    description: "Graph-input GNN with alpha fixed to 0.0"
    ml: true
    model: results/models/bbml_gnn_graph.onnx
    temperature: results/models/bbml_gnn_graph.temperature.txt

  no-temperature:
    description: "Graph-input GNN with temperature disabled"
    ml: true
    model: results/models/bbml_gnn_graph.onnx

  no-cond-gate:
    description: "Graph-input GNN with the numerical fallback disabled"
    ml: true
    model: results/models/bbml_gnn_graph.onnx
    temperature: results/models/bbml_gnn_graph.temperature.txt

  no-conf-gate:
    description: "Graph-input GNN with the confidence gate disabled"
    ml: true
    model: results/models/bbml_gnn_graph.onnx
    temperature: results/models/bbml_gnn_graph.temperature.txt
